<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Урал Марио - Автопром Марио</title>
    <style>
        body { margin:0; overflow:hidden; background:#0a0a0a; font-family:Arial; }
        canvas { display:block; margin:0 auto; image-rendering:pixelated; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; z-index: 100;
            text-shadow: 2px 2px 4px black;
        }
        #game-over, #win {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); color: white; padding: 30px; border-radius: 15px;
            text-align: center; display: none; z-index: 200;
        }
    </style>
</head>
<body>
    <div id="ui">Счёт: <span id="score">0</span> | Монеты: <span id="coins">0</span></div>
    <canvas id="game" width="1200" height="600"></canvas>

    <div id="game-over">
        <h1>💥 Катастрофа на дороге!</h1>
        <p>Счёт: <span id="final-score">0</span></p>
        <button onclick="restart()">Начать заново</button>
    </div>

    <div id="win">
        <h1>🏁 Уровень пройден!</h1>
        <p>Отличная работа, директор!</p>
        <button onclick="restart()">Играть снова</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let coins = 0;

        // Игрок - лысый бизнесмен
        let player = {
            x: 100,
            y: 400,
            width: 50,
            height: 60,
            velX: 0,
            velY: 0,
            speed: 5,
            jump: -15,
            grounded: false
        };

        let keys = {};
        let gravity = 0.8;
        let scrollX = 0;

        // Платформы и земля
        let platforms = [
            {x:0, y:500, w:2000, h:100}, // ground
            {x:400, y:380, w:200, h:20},
            {x:700, y:280, w:180, h:20},
            {x:1000, y:420, w:150, h:20},
            {x:1300, y:320, w:220, h:20},
            {x:1700, y:250, w:180, h:20},
            {x:2100, y:400, w:300, h:20},
        ];

        // Монеты
        let coinList = [
            {x:450, y:300, collected:false},
            {x:750, y:200, collected:false},
            {x:1050, y:340, collected:false},
            {x:1350, y:240, collected:false},
            {x:1750, y:180, collected:false},
            {x:2200, y:320, collected:false},
        ];

        // Враги - Уралы
        let enemies = [
            {x:600, y:440, velX: -2, width:70, height:50},
            {x:1100, y:440, velX: -3, width:70, height:50},
            {x:1600, y:440, velX: -2.5, width:70, height:50},
            {x:2000, y:440, velX: -3, width:70, height:50},
        ];

        let gameOver = false;
        let win = false;

        // Управление
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function drawBackground() {
            ctx.fillStyle = '#1a3c2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Небо с заводами
            ctx.fillStyle = '#0f2a1f';
            ctx.fillRect(0, 0, canvas.width, 350);

            // Дым из труб
            ctx.fillStyle = 'rgba(200,200,200,0.4)';
            for(let i=0; i<8; i++) {
                let px = (i*280 - scrollX*0.3) % 1400;
                ctx.fillRect(px, 80 + Math.sin(i)*20, 60, 120);
            }

            // Дорога
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 480, canvas.width, 120);

            // Разметка
            ctx.strokeStyle = '#ff0';
            ctx.lineWidth = 6;
            for(let i=0; i<15; i++) {
                let px = (i*120 - (scrollX*0.8 % 120));
                ctx.beginPath();
                ctx.moveTo(px, 520);
                ctx.lineTo(px+60, 520);
                ctx.stroke();
            }
        }

        function update() {
            if (gameOver || win) return;

            // Движение игрока
            player.velX = 0;
            if (keys['ArrowLeft'] || keys['a']) player.velX = -player.speed;
            if (keys['ArrowRight'] || keys['d']) player.velX = player.speed;

            if ((keys[' '] || keys['ArrowUp'] || keys['w']) && player.grounded) {
                player.velY = player.jump;
                player.grounded = false;
            }

            player.velY += gravity;
            player.x += player.velX;
            player.y += player.velY;

            // Гравитация и платформы
            player.grounded = false;
            for (let p of platforms) {
                if (player.x < p.x + p.w && player.x + player.width > p.x &&
                    player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (player.velY > 0 && player.y < p.y) {
                        player.y = p.y - player.height;
                        player.velY = 0;
                        player.grounded = true;
                    }
                }
            }

            // Падение в яму
            if (player.y > 650) {
                gameOver = true;
                document.getElementById('game-over').style.display = 'block';
            }

            // Камера
            if (player.x - scrollX > 600) scrollX = player.x - 600;

            // Монеты
            for (let c of coinList) {
                if (!c.collected && Math.abs(player.x - c.x) < 40 && Math.abs(player.y - c.y) < 50) {
                    c.collected = true;
                    coins++;
                    score += 100;
                    document.getElementById('coins').textContent = coins;
                    document.getElementById('score').textContent = score;
                }
            }

            // Враги
            for (let e of enemies) {
                e.x += e.velX;

                // Столкновение с игроком
                if (Math.abs(player.x - e.x) < 50 && Math.abs(player.y - e.y) < 50) {
                    if (player.velY > 0 && player.y < e.y) {
                        // Убить врага прыжком сверху
                        enemies.splice(enemies.indexOf(e), 1);
                        score += 300;
                        player.velY = -12;
                    } else {
                        gameOver = true;
                        document.getElementById('game-over').style.display = 'block';
                    }
                }

                // Отскок от краёв
                if (e.x < 200 || e.x > 2400) e.velX *= -1;
            }

            // Победа
            if (player.x > 2450) {
                win = true;
                document.getElementById('win').style.display = 'block';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            // Платформы
            ctx.fillStyle = '#555';
            for (let p of platforms) {
                ctx.fillRect(p.x - scrollX, p.y, p.w, p.h);
            }

            // Монеты
            ctx.fillStyle = '#ff0';
            for (let c of coinList) {
                if (!c.collected) {
                    ctx.beginPath();
                    ctx.arc(c.x - scrollX, c.y, 18, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#fc0';
                    ctx.font = 'bold 18px Arial';
                    ctx.fillText('₽', c.x - scrollX - 8, c.y + 7);
                }
            }

            // Игрок (лысый чувак)
            ctx.fillStyle = '#f4a261';
            ctx.fillRect(player.x - scrollX, player.y, player.width, player.height); // тело
            ctx.fillStyle = '#222';
            ctx.fillRect(player.x - scrollX + 10, player.y + 10, 30, 25); // костюм
            ctx.fillStyle = '#f8d'; // голова
            ctx.beginPath();
            ctx.arc(player.x - scrollX + 25, player.y + 18, 14, 0, Math.PI*2);
            ctx.fill();

            // Враги Урал
            ctx.fillStyle = '#c00';
            for (let e of enemies) {
                ctx.fillRect(e.x - scrollX, e.y, e.width, e.height);
                ctx.fillStyle = '#222';
                ctx.fillRect(e.x - scrollX + 10, e.y + 10, 50, 25);
                ctx.fillStyle = '#c00';
            }

            // Текст
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText('🏭 УРАЛ МАРИО', 20, 40);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function restart() {
            location.reload();
        }

        loop();
    </script>
</body>
</html>
